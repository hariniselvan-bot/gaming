<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Stackly</title>
  <meta name="description" content="The page you are looking for could not be found.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--bg-cream);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .error-section::before {
      content: '404';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30rem;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.03;
      font-family: var(--font-body);
      line-height: 1;
      pointer-events: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
    }
    .error-content h1 {
      font-size: 10rem;
      line-height: 1;
      color: var(--primary);
      opacity: 0.15;
      font-family: var(--font-body);
      font-weight: 800;
    }
    .error-content h2 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      margin-top: -20px;
    }
    .error-content p {
      font-size: 1.1rem;
      color: var(--text-body);
      margin-bottom: 32px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-illustration {
      width: 300px;
      height: 300px;
      margin: 0 auto 40px;
      position: relative;
    }
    .error-illustration .planet {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 60px rgba(107, 29, 29, 0.3);
    }
    .error-illustration .orbit {
      width: 200px;
      height: 200px;
      border: 2px dashed var(--border-light);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
    }
    .error-illustration .satellite {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
    }
    .error-illustration .stars {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .error-illustration .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <section class="error-section">
    <div class="error-content">
      <div class="error-illustration">
        <div class="stars">
          <div class="star" style="top:20%; left:10%; animation-delay:0s;"></div>
          <div class="star" style="top:15%; right:20%; animation-delay:0.5s;"></div>
          <div class="star" style="bottom:25%; left:15%; animation-delay:1s;"></div>
          <div class="star" style="bottom:20%; right:10%; animation-delay:1.5s;"></div>
          <div class="star" style="top:40%; left:5%; animation-delay:0.3s;"></div>
          <div class="star" style="top:60%; right:5%; animation-delay:0.8s;"></div>
        </div>
        <div class="orbit">
          <div class="satellite"></div>
        </div>
        <div class="planet"></div>
      </div>
      
      <h1>404</h1>
      <h2>Lost in Space?</h2>
      <p>The page you're looking for seems to have floated away into the digital cosmos. Don't worry, we'll help you find your way back.</p>
      
      <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
        <button type="button" class="btn btn-primary btn-lg" onclick="window.history.back();"><i class="fas fa-arrow-left"></i> Back</button>
        <a href="contact.html" class="btn btn-secondary btn-lg"><i class="fas fa-envelope"></i> Contact Support</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
