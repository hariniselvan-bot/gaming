<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Loading</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="loading.css">

</head>

<body>

<div class="stackly-loader-page">

    <!-- Background Glow -->

    <div class="stackly-loader-glow stackly-glow-one"></div>
    <div class="stackly-loader-glow stackly-glow-two"></div>

    <!-- Loader -->

    <div class="stackly-loader-box">

        <!-- Rotating Circle -->

        <div class="stackly-loader-circle">

            <svg class="stackly-loader-svg" viewBox="0 0 200 200">

                <!-- Background Circle -->

                <circle
                    class="stackly-loader-track"
                    cx="100"
                    cy="100"
                    r="82">
                </circle>

                <!-- Animated Circle -->

                <circle
                    class="stackly-loader-progress"
                    cx="100"
                    cy="100"
                    r="82">
                </circle>

            </svg>

            <!-- Logo -->

            <div class="stackly-loader-logo">

                <!-- Replace with your logo -->

                <img src="logo.webp" alt="Stackly Logo">

            </div>

        </div>

        <!-- Brand -->

        <h1 class="stackly-loader-title">

            STACKLY

        </h1>

        <!-- Loading Text -->

        <div class="stackly-loader-text">

            <span>L</span>
            <span>O</span>
            <span>A</span>
            <span>D</span>
            <span>I</span>
            <span>N</span>
            <span>G</span>

        </div>

    </div>

</div>

<script src="loading.js"></script>
<style>
    /*========================================
    GOOGLE FONT & RESET
========================================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Oxanium',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#070312;
    overflow:hidden;
}

/*========================================
    PAGE
========================================*/

.stackly-loader-page{

    position:relative;

    width:100%;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:linear-gradient(180deg,#080312,#040207);

}

/*========================================
    BACKGROUND GLOW
========================================*/

.stackly-loader-glow{

    position:absolute;

    width:420px;

    height:420px;

    border-radius:50%;

    filter:blur(120px);

}

.stackly-glow-one{

    top:-120px;

    left:-120px;

    background:rgba(255,0,0,.15);

}

.stackly-glow-two{

    bottom:-120px;

    right:-120px;

    background:rgba(255,0,0,.12);

}

/*========================================
    BOX
========================================*/

.stackly-loader-box{

    position:relative;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    z-index:2;

}

/*========================================
    CIRCLE
========================================*/

.stackly-loader-circle{

    position:relative;

    width:260px;

    height:260px;

    display:flex;

    justify-content:center;

    align-items:center;

}

/*========================================
    SVG
========================================*/

.stackly-loader-svg{

    position:absolute;

    width:260px;

    height:260px;

    transform:rotate(-90deg);

}

/*========================================
    TRACK
========================================*/

.stackly-loader-track{

    fill:none;

    stroke:#1a1a25;

    stroke-width:8;

}

/*========================================
    PROGRESS
========================================*/

.stackly-loader-progress{

    fill:none;

    stroke:#ff2020;

    stroke-width:8;

    stroke-linecap:round;

    stroke-dasharray:515;

    stroke-dashoffset:170;

    filter:drop-shadow(0 0 12px #ff2020);

    animation:stacklyRotate 2s linear infinite;

}

/*========================================
    LOGO
========================================*/

.stackly-loader-logo{

    width:120px;

    height:120px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#090909;

    box-shadow:
    0 0 30px rgba(255,0,0,.25);

}

.stackly-loader-logo img{

    width:75px;

    object-fit:contain;

}

/*========================================
    TITLE
========================================*/

.stackly-loader-title{

    margin-top:35px;

    font-size:52px;

    font-weight:800;

    letter-spacing:5px;

    color:#ffffff;

    text-shadow:0 0 15px rgba(255,0,0,.3);

}

/*========================================
    LOADING TEXT
========================================*/

.stackly-loader-text{

    display:flex;

    gap:6px;

    margin-top:18px;

}

.stackly-loader-text span{

    color:#9d9d9d;

    font-size:18px;

    letter-spacing:3px;

    animation:stacklyBounce 1.2s infinite;

}

.stackly-loader-text span:nth-child(2){

animation-delay:.1s;

}

.stackly-loader-text span:nth-child(3){

animation-delay:.2s;

}

.stackly-loader-text span:nth-child(4){

animation-delay:.3s;

}

.stackly-loader-text span:nth-child(5){

animation-delay:.4s;

}

.stackly-loader-text span:nth-child(6){

animation-delay:.5s;

}

.stackly-loader-text span:nth-child(7){

animation-delay:.6s;

}

/*========================================
    RED SHADOW
========================================*/

.stackly-loader-box::after{

    content:"";

    position:absolute;

    bottom:-40px;

    width:180px;

    height:18px;

    background:#ff2020;

    filter:blur(25px);

    opacity:.45;

}

/*========================================
    ROTATE
========================================*/

@keyframes stacklyRotate{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

/*========================================
    LOADING
========================================*/

@keyframes stacklyBounce{

0%,100%{

opacity:.4;

transform:translateY(0);

}

50%{

opacity:1;

color:#ff2020;

transform:translateY(-8px);

}

}

/*========================================
    MOBILE
========================================*/

@media(max-width:768px){

.stackly-loader-circle{

width:210px;

height:210px;

}

.stackly-loader-svg{

width:210px;

height:210px;

}

.stackly-loader-logo{

width:95px;

height:95px;

}

.stackly-loader-logo img{

width:60px;

}

.stackly-loader-title{

font-size:36px;

}

.stackly-loader-text span{

font-size:15px;

}

}
</style>
<script>
    //=========================================
// STACKLY LOADER
//=========================================

document.addEventListener("DOMContentLoaded", () => {

    const logo = document.querySelector(".stackly-loader-logo");
    const title = document.querySelector(".stackly-loader-title");
    const loadingText = document.querySelector(".stackly-loader-text");

    /*=========================================
        LOGO PULSE
    =========================================*/

    setInterval(() => {

        logo.animate([
            {
                transform: "scale(1)"
            },
            {
                transform: "scale(1.08)"
            },
            {
                transform: "scale(1)"
            }

        ], {

            duration: 1200

        });

    }, 1200);

    /*=========================================
        TITLE GLOW
    =========================================*/

    setInterval(() => {

        title.animate([
            {
                letterSpacing: "5px",
                opacity: 1
            },
            {
                letterSpacing: "8px",
                opacity: .8
            },
            {
                letterSpacing: "5px",
                opacity: 1
            }

        ], {

            duration: 1500

        });

    }, 1500);

    /*=========================================
        LOADING DOTS
    =========================================*/

    let dots = "";

    setInterval(() => {

        dots += ".";

        if (dots.length > 3) dots = "";

        loadingText.innerHTML = "LOADING" + dots;

    }, 500);

    /*=========================================
        PAGE REDIRECT
    =========================================*/

    setTimeout(() => {

        document.body.style.opacity = "0";

        document.body.style.transition = "opacity .8s ease";

        setTimeout(() => {

            window.location.href = "home.html";

        }, 800);

    }, 3000);

});
window.addEventListener("load", () => {

    setTimeout(() => {

        document.body.style.opacity = "0";
        document.body.style.transition = "opacity .8s";

        setTimeout(() => {

            window.location.href = "home.html";

        }, 800);

    }, 2500);

});
</script>
</body>
</html>
