<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly</title>
  <meta name="description" content="Login to your Stackly account to access courses, track progress, and connect with the community.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-bg-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .auth-bg-shapes .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .auth-bg-shapes .shape:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; }
    .auth-bg-shapes .shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; right: -50px; }
    .auth-bg-shapes .shape:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 10%; }
  </style>
</head>
<body>
  <section class="auth-section">
    <div class="auth-bg-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>

    <div class="auth-container scale-in">
      <div class="auth-logo">
        <a href="index.html" class="logo" style="justify-content:center;">
          <div class="logo-icon">S</div>
          <span>STACKLY</span>
        </a>
        <p>Welcome back! Please login to your account.</p>
      </div>

      <!-- Role Selector -->
      <div class="role-selector">
        <button class="role-btn active" data-role="user">
          <i class="fas fa-user"></i> Student
        </button>
        <button class="role-btn" data-role="admin">
          <i class="fas fa-user-shield"></i> Admin
        </button>
      </div>

      <form class="auth-form" data-validate data-current-role="user">
        <input type="hidden" name="role" value="user">

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" placeholder="Enter your password" required>
            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" checked>
            <span>Remember me</span>
          </label>
          <a href="404.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary auth-btn">Login <i class="fas fa-sign-in-alt"></i></button>
      </form>

      <div class="auth-divider">or login with</div>

      <div class="social-auth">
  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-google" style="color:#DB4437;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-facebook-f" style="color:#4267B2;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-github" style="color:#333;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-linkedin-in" style="color:#0077b5;"></i>
  </button>
</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

      <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:var(--text-light); font-size:0.9rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
