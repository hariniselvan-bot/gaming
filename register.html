<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Stackly</title>
  <meta name="description" content="Create your Stackly account and start your learning journey today.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-bg-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .auth-bg-shapes .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .auth-bg-shapes .shape:nth-child(1) { width: 300px; height: 300px; top: -100px; right: -100px; }
    .auth-bg-shapes .shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; left: -50px; }
    .auth-bg-shapes .shape:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 15%; }
  </style>
</head>
<body>
  <section class="auth-section">
    <div class="auth-bg-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>

    <div class="auth-container scale-in" style="max-width:520px;">
      <div class="auth-logo">
        <a href="index.html" class="logo" style="justify-content:center;">
          <div class="logo-icon">S</div>
          <span>STACKLY</span>
        </a>
        <p>Create your account and start learning today!</p>
      </div>

      <form class="auth-form" data-validate>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" name="firstName" class="form-control" placeholder="John" required>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" name="lastName" class="form-control" placeholder="Doe" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" class="form-control" placeholder="+1 (234) 567 8900">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <div class="form-group">
          <label>I want to join as</label>
          <div class="role-selector" style="margin-bottom:0;">
            <button type="button" class="role-btn active" data-role="student">
              <i class="fas fa-user-graduate"></i> Student
            </button>
            <button type="button" class="role-btn" data-role="instructor">
              <i class="fas fa-chalkboard-teacher"></i> Instructor
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="remember-me" style="font-weight:400;">
            <input type="checkbox" required>
            <span>I agree to the <a href="#" style="color:var(--primary);">Terms of Service</a> and <a href="#" style="color:var(--primary);">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary auth-btn">Create Account <i class="fas fa-user-plus"></i></button>
      </form>

      <div class="auth-divider">or register with</div>

      <div class="social-auth">
  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-google" style="color:#DB4437;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-facebook-f" style="color:#4267B2;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-github" style="color:#333;"></i>
  </button>

  <button class="social-auth-btn" type="button" onclick="location.href='404.html'">
    <i class="fab fa-linkedin-in" style="color:#0077b5;"></i>
  </button>
</div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>

      <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:var(--text-light); font-size:0.9rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
